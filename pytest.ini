[pytest]
# Runway test suite. Runs entirely on synthetic fixtures (TEST_SPEC §6, J3) so a
# fresh clone tests everything without the 100 MB DOL download. Install the
# dev-only deps first:  pip install -r requirements.txt -r requirements-dev.txt
testpaths = tests
# WARN tests are xfail(strict): an xfail that unexpectedly PASSES is a failure,
# so a "fixed" WARN item forces its marker to be removed (TEST_SPEC §8.2).
xfail_strict = true
addopts = -ra
