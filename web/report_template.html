<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Runway — your report</title>
<!--
  SELF-CONTAINED BY REQUIREMENT. This file is opened from disk (file://) after an
  agent injects a report into it, so it can never fetch anything: no external CSS,
  no external JS, no web fonts. Everything it needs is inline.

  THE HANDOFF MECHANISM
  An agent that ran the recommendations prompt does exactly one thing to this file:
  replace the placeholder token in the report-data script block below with the
  report JSON, then open the result. It does NOT generate markup — this page
  renders itself. That is what makes the handoff reliable on a small model: a
  string replace is deterministic, whereas a model retyping an HTML file is not.

  The token appears EXACTLY ONCE in this file, on purpose. Do not write it again
  anywhere (not even in a comment) — a second occurrence makes "replace the first
  match" ambiguous and can corrupt the wrong line.

  Escaping is owned by scripts/make_report.py: every `</` in the JSON becomes
  `<\/` before substitution. That is the only sequence that can close this
  script block early, and `\/` is a valid JSON escape for `/`, so the value
  decodes unchanged.

  Opened WITHOUT substitution, the token is still present and this page falls back
  to a paste box — so the same file serves the agent handoff and the manual path,
  and there is only one render surface to maintain.

  SECURITY: every value from the report reaches the DOM via textContent, never
  innerHTML. The report is model output and must be treated as untrusted.
-->
<style>
  :root {
    color-scheme: light dark;
    --bg: #fbfaf8; --surface: #ffffff; --ink: #191919; --ink-soft: #4a4a4a;
    --muted: #6b6b6b; --line: #e6e3de; --line-soft: #f0eeea;
    --accent: #1f5c8b; --shadow: 0 1px 2px rgba(40,36,30,.05), 0 6px 16px -8px rgba(40,36,30,.10);
    --warn-bg: #fdf9ee; --warn-line: #e8dcbc; --inset: #f6f5f2;
    --shown-bg: #edf5ee; --shown-line: #bcd6bf; --shown-ink: #2c5c33;
    --partial-bg: #eef3f9; --partial-line: #bed0e3; --partial-ink: #275a86;
    --gap-bg: #fdf2e6; --gap-line: #e6c9a3; --gap-ink: #8a5214;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16171a; --surface: #1d1f23; --ink: #e9e7e4; --ink-soft: #c3c0bb;
      --muted: #9a9793; --line: #303338; --line-soft: #26292d;
      --accent: #7fb3d9; --shadow: none;
      --warn-bg: #241f14; --warn-line: #4a4028; --inset: #24262b;
      --shown-bg: #1b2a1d; --shown-line: #35543a; --shown-ink: #9fcaa5;
      --partial-bg: #182430; --partial-line: #2f4e69; --partial-ink: #9cc4e6;
      --gap-bg: #2b2113; --gap-line: #58432a; --gap-ink: #e0ab6d;
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0 auto; padding: 3rem 1.25rem 6rem; max-width: 44rem;
    font: 17px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  /* Reading measure: prose caps near 68 characters regardless of container width. */
  p, li, .record { max-width: 68ch; }

  h1, h2, h3 { text-wrap: balance; }
  p, li, .lede, .grounding, .sub { text-wrap: pretty; }
  h1 { font-size: 1.6rem; line-height: 1.25; letter-spacing: -.015em; margin: 0 0 .3rem; }
  h2 {
    font-size: .78rem; text-transform: uppercase; letter-spacing: .09em; font-weight: 600;
    color: var(--ink-soft); margin: 3.25rem 0 1rem; padding-bottom: .45rem;
    border-bottom: 1px solid var(--line);
  }
  h3 { font-size: 1.02rem; line-height: 1.4; margin: 0 0 .15rem; letter-spacing: -.005em; }
  p { margin: .55rem 0; }
  .sub { color: var(--muted); margin: 0 0 1rem; font-size: .93rem; max-width: 68ch; }
  .lede { font-size: 1.2rem; line-height: 1.5; letter-spacing: -.01em; margin: 0 0 .45rem; }
  .why { color: var(--ink-soft); }

  /* Cards carry real grouping (one skill, one company), so they stay -- but quietly:
     no border, tinted shadow, which reads as separation without drawing a box. */
  .card {
    background: var(--surface); border-radius: 10px; box-shadow: var(--shadow);
    padding: 1.05rem 1.15rem; margin: .8rem 0;
  }
  @media (prefers-color-scheme: dark) { .card { border: 1px solid var(--line); } }

  .tag {
    display: inline-block; font-size: .68rem; text-transform: uppercase; font-weight: 600;
    letter-spacing: .06em; padding: .18rem .55rem; border-radius: 999px;
    border: 1px solid var(--line); color: var(--muted);
    margin-left: .5rem; vertical-align: 2px; white-space: nowrap;
  }
  .tag-shown { background: var(--shown-bg); border-color: var(--shown-line); color: var(--shown-ink); }
  .tag-partial { background: var(--partial-bg); border-color: var(--partial-line); color: var(--partial-ink); }
  .tag-gap { background: var(--gap-bg); border-color: var(--gap-line); color: var(--gap-ink); }

  .grounding { font-size: .9rem; color: var(--ink-soft); margin: .35rem 0 0; max-width: 68ch; }
  .label { font-weight: 600; color: var(--ink); }
  ul { margin: .4rem 0; padding-left: 1.15rem; }
  li { margin: .25rem 0; }
  a { color: var(--accent); text-underline-offset: 2px; }
  ul.others { list-style: none; padding-left: 0; margin: .5rem 0 0; }
  ul.others li { margin: .5rem 0; }
  ul.others .tag { font-size: .62rem; margin-left: .4rem; }
  .sources { font-size: .86rem; margin-top: .6rem; }
  .sources li { word-break: break-word; }
  .none { color: var(--muted); font-style: italic; }

  .callout {
    background: var(--warn-bg); border: 1px solid var(--warn-line);
    border-radius: 10px; padding: .85rem 1.05rem; margin: .7rem 0;
  }

  .record { font-size: .93rem; border-collapse: collapse; }
  .record th { font-weight: 400; text-align: left; }
  .record th, .record td { padding: .35rem 1.25rem .35rem 0; border-bottom: 1px solid var(--line-soft); }
  .record tr:last-child td { border-bottom: 0; }
  .yes { color: var(--shown-ink); font-weight: 600; }
  .no { color: var(--gap-ink); font-weight: 600; }

  /* Disclosure: the trust surface. Quiet until wanted, obvious once noticed. */
  details { margin-top: .7rem; }
  summary.why-summary {
    cursor: pointer; font-size: .86rem; color: var(--accent);
    display: inline-flex; align-items: center; gap: .3rem;
    padding: .15rem .1rem; border-radius: 4px; width: fit-content;
  }
  summary.why-summary::marker { font-size: .8em; }
  @media (hover: hover) and (pointer: fine) {
    summary.why-summary:hover { text-decoration: underline; }
  }
  .why-body {
    margin-top: .55rem; padding: .65rem .85rem; border-radius: 8px;
    background: var(--inset);
  }
  .why-body > p:first-child { margin-top: 0; }
  .why-body > p:last-child { margin-bottom: 0; }

  /* Keyboard users must always see where they are. */
  :where(a, button, summary, textarea):focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px;
  }

  .visually-hidden {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
  #paste-view { display: none; }
  textarea {
    width: 100%; min-height: 14rem; padding: .7rem;
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .85rem; line-height: 1.5;
    color: var(--ink); background: var(--surface);
    border: 1px solid var(--line); border-radius: 8px;
  }
  button {
    font: inherit; font-size: .95rem; padding: .5rem 1.05rem;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--surface); color: var(--ink); cursor: pointer;
    transition: transform 120ms cubic-bezier(.23,1,.32,1), background-color 120ms ease;
  }
  @media (hover: hover) and (pointer: fine) { button:hover { background: var(--line-soft); } }
  button:active { transform: scale(.975); }
  .error { color: #a3341f; }
  @media (prefers-color-scheme: dark) { .error { color: #e08a72; } }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
  }

  /* A report gets printed and PDF'd. Reveal every disclosure so nothing the
     reader relied on is missing from the paper copy. */
  @media print {
    body { background: #fff; color: #000; padding: 0; max-width: none; font-size: 11pt; }
    .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
    details { break-inside: avoid; }
    details > .why-body { display: block !important; }
    #paste-view { display: none !important; }
    a { color: #000; }
  }
</style>
</head>
<body>

<main>
<div id="paste-view">
  <h1>Your Runway report</h1>
  <p class="sub">Paste the JSON your LLM returned. Nothing leaves this page — it renders in your browser.</p>
  <label for="paste-input" class="visually-hidden">Paste the JSON your LLM returned</label>
  <textarea id="paste-input" spellcheck="false" placeholder='Paste the whole reply. A ```json fence or a note after it is fine.'></textarea>
  <p><button id="paste-btn" type="button">Show my report</button></p>
  <p id="paste-error" class="error" role="alert"></p>
</div>

<div id="report-view"></div>
</main>

<script type="application/json" id="report-data">__REPORT_JSON__</script>
<script>
(function () {
  "use strict";

  var PLACEHOLDER = "__REPORT_" + "JSON__";   // split so substitution can't hit this line

  /* ---------------------------------------------------------------- parse */

  // Tolerates a ```json fence AND prose before/after the object: a real run
  // appended a plain-English note after the closing brace, so assuming the whole
  // string is JSON is not safe. Take the outermost {...} instead.
  function parseReport(text) {
    if (typeof text !== "string" || !text.trim()) throw new Error("empty");
    var start = text.indexOf("{");
    var end = text.lastIndexOf("}");
    if (start < 0 || end <= start) throw new Error("no JSON object found");
    var data = JSON.parse(text.slice(start, end + 1));
    if (!data || typeof data !== "object") throw new Error("not an object");
    // distinctive_edge is legitimately null, so it can never be required.
    if (!data.headline && !data.one_thing_to_work_on) {
      throw new Error("this does not look like a Runway report");
    }
    return data;
  }

  /* --------------------------------------------------------------- render */

  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text !== undefined && text !== null && text !== "") n.textContent = String(text);
    return n;
  }

  function section(root, title) {
    root.appendChild(el("h2", null, title));
  }

  function sourceList(urls) {
    if (!Array.isArray(urls) || !urls.length) return null;
    var wrap = el("div", "sources");
    wrap.appendChild(el("span", "label", "Sources: "));
    var ul = el("ul");
    urls.forEach(function (u) {
      var li = el("li");
      var a = el("a", null, u);
      // Only http(s) becomes a live link; anything else stays inert text.
      if (/^https?:\/\//i.test(String(u))) {
        a.href = u; a.target = "_blank"; a.rel = "noopener noreferrer";
        a.appendChild(el("span", "visually-hidden", " (opens in a new tab)"));
        li.appendChild(a);
      } else {
        li.appendChild(el("span", null, u));
      }
      ul.appendChild(li);
    });
    wrap.appendChild(ul);
    return wrap;
  }

  var SKILL_TAG = {
    already_shown: ["tag tag-shown", "already shown"],
    partial: ["tag tag-partial", "partially shown"],
    gap: ["tag tag-gap", "gap"]
  };

  var MODE_LABEL = {
    new_project: "Start something new",
    deepen_existing: "Deepen what you're building",
    reframe_existing: "Reframe what you're building"
  };

  function renderReport(data, root) {
    root.replaceChildren();

    root.appendChild(el("h1", null, "Your Runway report"));
    root.appendChild(el("p", "sub", "Career and portfolio guidance from your own LLM run — not immigration legal advice."));

    // --- headline
    if (data.headline) {
      section(root, "The one direction");
      root.appendChild(el("p", "lede", data.headline.angle));
      if (data.headline.why) root.appendChild(el("p", "why", data.headline.why));
    }

    // --- skills, ordered by priority (1 = highest)
    var skills = Array.isArray(data.skills_to_demonstrate) ? data.skills_to_demonstrate.slice() : [];
    if (skills.length) {
      skills.sort(function (a, b) { return (a.priority || 99) - (b.priority || 99); });
      section(root, "Skills to demonstrate");
      skills.forEach(function (s) {
        var card = el("div", "card");
        var h = el("h3", null, s.skill);
        var tag = SKILL_TAG[s.relative_to_you];
        if (tag) {
          h.appendChild(document.createTextNode(" "));
          var pill = el("span", tag[0]);
          pill.appendChild(el("span", "visually-hidden", "status: "));
          pill.appendChild(document.createTextNode(tag[1]));
          h.appendChild(pill);
        }
        card.appendChild(h);

        // The rating is a judgment, so it has to be inspectable rather than
        // asserted: one click shows what the market signal was AND what in the
        // person's own work earned the rating. A rating whose personal evidence
        // is null says so out loud — that is the case most likely to be wrong.
        var why = document.createElement("details");
        why.appendChild(el("summary", "why-summary", "Why this rating?"));
        var inner = el("div", "why-body");

        var mine = el("p", "grounding");
        mine.appendChild(el("span", "label", "In your work: "));
        if (s.evidence_in_your_work) {
          mine.appendChild(el("span", null, s.evidence_in_your_work));
        } else {
          mine.appendChild(el("span", "none",
            "nothing specific was pointed to — this rating is inferred, so treat it with suspicion and check it yourself."));
        }
        inner.appendChild(mine);

        if (s.grounding) {
          var mkt = el("p", "grounding");
          mkt.appendChild(el("span", "label", "Why the market wants it: "));
          mkt.appendChild(el("span", null, s.grounding));
          inner.appendChild(mkt);
        }
        why.appendChild(inner);
        card.appendChild(why);
        root.appendChild(card);
      });
    }

    // --- the one thing
    var one = data.one_thing_to_work_on;
    if (one) {
      section(root, "The one thing to work on");
      var card = el("div", "card");
      if (MODE_LABEL[one.mode]) card.appendChild(el("h3", null, MODE_LABEL[one.mode]));
      if (one.recommendation) card.appendChild(el("p", "lede", one.recommendation));
      if (one.why) card.appendChild(el("p", null, one.why));
      if (one.how) {
        var howP = el("p");
        howP.appendChild(el("span", "label", "How to actually do it: "));
        howP.appendChild(el("span", null, one.how));
        card.appendChild(howP);
      }
      if (one.how_it_signals) {
        var p = el("p", "why");
        p.appendChild(el("span", "label", "How it reads: "));
        p.appendChild(el("span", null, one.how_it_signals));
        card.appendChild(p);
      }
      if (one.current_work_note) {
        var n = el("p", "why");
        n.appendChild(el("span", "label", "On what you're already building: "));
        n.appendChild(el("span", null, one.current_work_note));
        card.appendChild(n);
      }
      root.appendChild(card);
    }

    // --- distinctive edge (null is the normal case — render nothing at all)
    var edge = data.distinctive_edge;
    if (edge && edge.trait) {
      section(root, "Something distinctive about you");
      var c = el("div", "card");
      c.appendChild(el("h3", null, edge.trait));
      if (edge.why_it_could_matter) c.appendChild(el("p", null, edge.why_it_could_matter));
      var scope = edge.evidence_scope;
      var scopeText =
        scope === "target" ? "Backed by the sponsor data for this role." :
        scope === "adjacent" ? "Not seen in this role's data — corroborated in adjacent markets, so treat it as a lead, not a proven pattern." :
        "The data is silent on this. It is a possibility worth testing, not a verdict.";
      c.appendChild(el("p", "grounding", scopeText));
      if (edge.evidence) c.appendChild(el("p", "grounding", edge.evidence));
      var src = sourceList(edge.sources);
      if (src) c.appendChild(src);
      root.appendChild(c);
    }


    // --- standout path: ONE recommendation, with the ranked field behind it as
    // the reason it is credible. The others are deliberately quiet -- a point and
    // a link, never a second and third recommendation competing for attention.
    var sp = data.standout_path;
    if (sp && sp.recommended && sp.recommended.path) {
      section(root, "The harder path worth taking");
      var c = el("div", "card");
      c.appendChild(el("h3", null, sp.recommended.path));
      if (sp.recommended.why_them) c.appendChild(el("p", null, sp.recommended.why_them));
      var ppl = Array.isArray(sp.recommended.people)
        ? sp.recommended.people.filter(function (p) { return p && p.name; }) : [];
      if (ppl.length) {
        var pw = el("div", "sources");
        pw.appendChild(el("span", "label", "Who does this: "));
        var pul = el("ul");
        ppl.forEach(function (p) {
          var li = el("li");
          if (p.link && /^https?:\/\//i.test(String(p.link))) {
            var pa = el("a", null, p.name);
            pa.href = p.link; pa.target = "_blank"; pa.rel = "noopener noreferrer";
            pa.appendChild(el("span", "visually-hidden", " (opens in a new tab)"));
            li.appendChild(pa);
          } else {
            li.appendChild(el("span", null, p.name));
          }
          pul.appendChild(li);
        });
        pw.appendChild(pul);
        c.appendChild(pw);
      }
      // Older reports carry a bare source URL instead of people[].
      var recSrc = ppl.length ? null : sourceList(sp.recommended.source ? [sp.recommended.source] : []);
      if (recSrc) c.appendChild(recSrc);

      var others = Array.isArray(sp.others) ? sp.others.filter(function (o) { return o && o.path; }) : [];
      if (others.length) {
        var why = document.createElement("details");
        why.appendChild(el("summary", "why-summary", "Why this one and not the others?"));
        var body = el("div", "why-body");
        body.appendChild(el("p", "grounding",
          "These are the capabilities the standouts in this role tend to have. This is the ranked set the recommendation above was picked from."));
        var ul = el("ul", "others");
        others.forEach(function (o) {
          var li = el("li", "grounding");
          li.appendChild(el("span", "label", o.path));
          if (o.already_have_it) li.appendChild(el("span", "tag tag-shown", "you have this"));
          if (o.note) li.appendChild(el("span", null, " — " + o.note));
          if (o.source && /^https?:\/\//i.test(String(o.source))) {
            li.appendChild(document.createTextNode(" "));
            var a = el("a", null, "source");
            a.href = o.source; a.target = "_blank"; a.rel = "noopener noreferrer";
            a.appendChild(el("span", "visually-hidden", " (opens in a new tab)"));
            li.appendChild(a);
          }
          ul.appendChild(li);
        });
        body.appendChild(ul);
        why.appendChild(body);
        c.appendChild(why);
      }
      root.appendChild(c);
    }

    // --- companies
    var notes = Array.isArray(data.company_notes) ? data.company_notes : [];
    if (notes.length) {
      section(root, "Your target companies");
      notes.forEach(function (n) {
        var c = el("div", "card");
        c.appendChild(el("h3", null, n.company));
        if (n.signal_in_filings) {
          var p = el("p");
          p.appendChild(el("span", "label", "What their filings show: "));
          p.appendChild(el("span", null, n.signal_in_filings));
          c.appendChild(p);
        }
        if (n.researched_context) {
          var r = el("p");
          r.appendChild(el("span", "label", "What research found: "));
          r.appendChild(el("span", null, n.researched_context));
          c.appendChild(r);
        } else {
          c.appendChild(el("p", "none", "No research was done on this company — only the filing facts above are known."));
        }
        var src = sourceList(n.sources);
        if (src) c.appendChild(src);
        root.appendChild(c);
      });
    }

    // --- what to know
    var know = Array.isArray(data.what_to_know) ? data.what_to_know : [];
    if (know.length) {
      section(root, "What to know");
      know.forEach(function (k) {
        var c = el("div", "callout");
        c.appendChild(el("p", "label", k.point));
        if (k.detail) c.appendChild(el("p", null, k.detail));
        root.appendChild(c);
      });
    }

    // --- run record: the transparency surface. Always shown, never buried —
    // the point is that the reader can see what the run could and could not do.
    var rec = data.run_record;
    if (rec) {
      section(root, "How this report was made");
      var t = el("table", "record");
      t.appendChild(el("caption", "visually-hidden", "What this report run was able to read"));
      [
        ["Read your portfolio", rec.portfolio_read],
        ["Read your résumé", rec.resume_read],
        ["You described current work", rec.current_work_provided],
        ["Researched the companies", rec.research_performed]
      ].forEach(function (row) {
        var tr = el("tr");
        var rowHead = el("th", null, row[0]);
        rowHead.setAttribute("scope", "row");
        tr.appendChild(rowHead);
        tr.appendChild(el("td", row[1] ? "yes" : "no", row[1] ? "yes" : "no"));
        t.appendChild(tr);
      });
      root.appendChild(t);
      if (rec.research_tool) root.appendChild(el("p", "grounding", "Research tool: " + rec.research_tool));
      if (rec.portfolio_read === false && rec.resume_read === false) {
        root.appendChild(el("p", "none",
          "Neither your portfolio nor your résumé was actually read, so anything about you in this report is inferred rather than observed. Worth re-running with readable materials."));
      }
    }
  }

  /* ----------------------------------------------------------------- boot */

  var reportView = document.getElementById("report-view");
  var pasteView = document.getElementById("paste-view");

  function showPaste(message) {
    pasteView.style.display = "block";
    if (message) document.getElementById("paste-error").textContent = message;
  }

  document.getElementById("paste-btn").addEventListener("click", function () {
    document.getElementById("paste-error").textContent = "";
    try {
      var data = parseReport(document.getElementById("paste-input").value);
      pasteView.style.display = "none";
      renderReport(data, reportView);
      window.scrollTo(0, 0);
    } catch (err) {
      document.getElementById("paste-error").textContent =
        "That didn't look like a Runway report (" + err.message + "). Paste the whole reply and try again.";
    }
  });

  var raw = document.getElementById("report-data").textContent.trim();
  if (!raw || raw === PLACEHOLDER) {
    showPaste("");                       // no report injected — manual path
  } else {
    try {
      renderReport(parseReport(raw), reportView);
    } catch (err) {
      showPaste("The injected report couldn't be read (" + err.message + "). Paste it below instead.");
    }
  }
})();
</script>
</body>
</html>
